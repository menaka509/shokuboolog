<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>食Booろぐ Powered by めなか</title>
  <meta name="description" content="友人同士で美味しいお店を共有・評価するソーシャルグルメアプリ">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#FF8A00">
  <link rel="apple-touch-icon" href="icon.png">
  
  <!-- CSS -->
  <link rel="stylesheet" href="css/app.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  
  <!-- Libraries -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <!-- Password Gate -->
  <div id="password-gate">
    <div style="text-align:center;padding:40px 30px;max-width:360px;width:100%;">
      <div style="font-size:5rem;margin-bottom:10px;">🐷</div>
      <h1 style="color:var(--primary);margin:0 0 4px;font-size:1.6rem;">食Booろぐ</h1>
      <p style="color:var(--text-muted);margin:0 0 30px;font-size:0.85rem;">Powered by めなか</p>
      <input type="password" id="gate-password" placeholder="パスワードを入力"
        style="width:100%;padding:14px;border:1px solid var(--border);border-radius:14px;font-size:1rem;text-align:center;margin-bottom:12px;"
        onkeydown="if(event.key==='Enter')window.checkSitePassword()">
      <button onclick="window.checkSitePassword()"
        style="width:100%;padding:14px;background:var(--primary);color:white;border:none;border-radius:14px;font-weight:700;font-size:1rem;">入場する 🔑</button>
      <div id="gate-error" style="color:#ff4444;font-size:0.8rem;margin-top:10px;display:none;">パスワードが違います</div>
    </div>
  </div>

  <div id="app" style="display:none;">
    <!-- Header -->
    <header>
      <h1><span>🐷</span> 食Booろぐ</h1>
      <div id="user-display" style="font-size: 0.8rem; color: var(--text-muted);">
        <!-- Active User Name -->
      </div>
    </header>

    <!-- Content Sections -->
    <main id="view-home" class="view-section active">
      <div style="padding: 10px; background: white; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 10;">
        <button onclick="window.openSearchModal()" style="width: 100%; padding: 10px; border-radius: 12px; border: 1px solid var(--border); background: var(--bg); color: var(--text-muted); text-align: left; font-size: 0.85rem;">
          🔍 条件で絞り込む
        </button>
      </div>
      <div id="restaurant-list">
        <!-- List Cards -->
      </div>
      <div id="empty-state" style="display:none; text-align:center; padding:40px; color:var(--text-muted);">
        <span style="font-size:4rem">🐷</span>
        <p>該当する投稿がありません</p>
      </div>
    </main>

    <main id="view-map" class="view-section">
      <div style="position: absolute; top: 10px; left: 10px; right: 10px; z-index: 1000;">
        <button onclick="window.openSearchModal()" style="width: 100%; padding: 12px; border-radius: 12px; border: none; background: white; box-shadow: 0 4px 10px rgba(0,0,0,0.1); color: var(--text-muted); text-align: left; font-size: 0.85rem; font-weight: 700;">
          🔍 条件で絞り込む
        </button>
      </div>
      <div id="map-container">
        <div id="map" style="height:100%; width:100%"></div>
      </div>
    </main>

    <main id="view-ranking" class="view-section">
      <div id="ranking-list" style="padding: 10px;">
        <!-- Ranking Cards -->
      </div>
    </main>

    <main id="view-settings" class="view-section">
      <div id="settings-content" style="padding: 10px;">
      </div>
    </main>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
      <a href="#" class="nav-item active" data-view="home">
        <span class="nav-icon">📋</span>
        <span>タイムライン</span>
      </a>
      <a href="#" class="nav-item" data-view="map">
        <span class="nav-icon">📍</span>
        <span>マップ</span>
      </a>
      <a href="#" class="nav-item" data-view="add">
        <div class="fab">＋</div>
        <span>追加</span>
      </a>
      <a href="#" class="nav-item" data-view="ranking">
        <span class="nav-icon">🏆</span>
        <span>ランキング</span>
      </a>
      <a href="#" class="nav-item" data-view="settings">
        <span class="nav-icon">⚙️</span>
        <span>設定</span>
      </a>
    </nav>

    <!-- Detail Modal -->
    <div id="modal-detail" class="modal-overlay" onclick="window.closeModal('detail', event)">
      <div class="modal-content">
        <div id="detail-body">
          <!-- Content injected via UI.js -->
        </div>
      </div>
    </div>

    <!-- Add Modal -->
    <div id="modal-add" class="modal-overlay" onclick="window.closeModal('add', event)">
      <div class="modal-content">
        <h2 style="margin-top:0">🍽️ お店を登録する</h2>
        <form id="add-form">
          <!-- Form fields handled in UI.js -->
        </form>
      </div>
    </div>

    <!-- Search Modal -->
    <div id="modal-search" class="modal-overlay" onclick="window.closeModal('search', event)">
      <div class="modal-content">
        <h2 style="margin-top:0">🔍 絞り込み検索</h2>
        <form id="search-form">
          <!-- Searched fields rendered by JS -->
        </form>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="js/config.js"></script>
  <script src="js/state.js"></script>
  <script src="js/api.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/map.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
